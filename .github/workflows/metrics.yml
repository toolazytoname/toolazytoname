name: Generate Profile Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Generate metrics svg（项目列表版）
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.svg
          # 关闭默认基础统计面板，只保留项目列表；想保留顶部头像/昵称可改为 base: header
          base: ""
          # 启用具体仓库列表插件（核心开关）
          plugin_repositories: yes
          # 展示12个仓库，按最近更新时间降序，排除fork仓库
          repositories_batch: 12
          repositories_order: updated
          repositories_forks: no
          repositories_affiliations: owner
